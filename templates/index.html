<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Storyboard Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>UX Storyboard Generator</h1>
        <p class="subtitle">Generate storyboards, identify pain points, and get design recommendations</p>

        <!-- Input Form -->
        <div class="card" id="input-section">
            <h2>Input</h2>
            <div class="form-group">
                <label>Persona</label>
                <input type="text" id="persona" placeholder="e.g. Working professional, 30s">
            </div>
            <div class="form-group">
                <label>Goal</label>
                <input type="text" id="goal" placeholder="e.g. Book a last minute flight">
            </div>
            <div class="form-group">
                <label>Product</label>
                <input type="text" id="product" placeholder="e.g. Travel booking website">
            </div>
            <div class="form-group">
                <label>Scenario</label>
                <input type="text" id="scenario" placeholder="e.g. 2 hours before departure">
            </div>
            <button id="example-btn" class="btn-secondary">Load Example</button>
            <button id="generate-btn" class="btn-primary">Generate Storyboard</button>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Running agents... this may take a moment</p>
        </div>

        <!-- Storyboard Panels -->
        <div class="card hidden" id="storyboard-section">
            <h2>📋 Storyboard</h2>
            <div id="panels-container" class="panels-grid"></div>
        </div>

        <!-- Critique -->
        <div class="card hidden" id="critique-section">
            <h2>🔍 UX Critique</h2>
            <div id="critiques-container"></div>
        </div>

        <!-- Recommendations -->
        <div class="card hidden" id="recommendations-section">
            <h2>💡 Design Recommendations</h2>
            <div id="recommendations-container"></div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
